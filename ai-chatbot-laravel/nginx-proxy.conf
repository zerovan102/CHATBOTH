server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_OR_IP; # Ganti dengan domain atau IP Anda
    root /path/to/ai-chatbot-laravel/public; # SESUAIKAN: Path ke direktori 'public' Laravel Anda

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ ^/index\.php(/|$) {
        # SESUAIKAN: Pastikan versi PHP-FPM sesuai dengan yang terinstal
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
